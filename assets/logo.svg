<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#0F1120"/>

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14" result="blur"/>
      <feFlood flood-color="#7B77FF" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in" result="glowLayer"/>
      <feMerge>
        <feMergeNode in="glowLayer"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Arrow 1: lower-left → upper-right -->
    <path
      d="M 320 820 L 320 480 L 760 230"
      stroke="#7B77FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="miter" fill="none"
    />
    <polygon points="821,195 773,274 729,196" fill="#7B77FF"/>

    <!-- Arrow 2: lower-right → upper-left (mirror) -->
    <path
      d="M 704 820 L 704 480 L 264 230"
      stroke="#7B77FF" stroke-width="26" stroke-linecap="round" stroke-linejoin="miter" fill="none"
    />
    <polygon points="203,195 251,274 295,196" fill="#7B77FF"/>
  </g>
</svg>
